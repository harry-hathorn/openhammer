# OpenHammer — Tier-3/Tier-4 containerized E2E (spec 16).
#
# One shared multi-stage image (Dockerfile) backs every service. Plain
# `docker compose up` starts ONLY `fixture-server` + `test-runner` (the others are
# profile-gated so a finishing/exiting service can never abort the deterministic
# E2E run). `npm run test:compose` runs that pair with
# `--exit-code-from test-runner --abort-on-container-exit`: the fixture's
# `/health` healthcheck gates `test-runner`'s start; when the runner exits, every
# service is torn down and its code propagates to compose.
#
# Streamable HTTP, not SSE (OpenHammer's transport) — the reference topology's
# sleep-sync is replaced by a `/health` healthcheck + `depends_on: service_healthy`.

services:
  # The deterministic green target: the standalone fixture
  # (`test/fixtures/minimal-mcp-server.ts`) over the `dev` stage, behind a fixed
  # bearer. `HOST=0.0.0.0` is load-bearing — `loadConfig`'s `127.0.0.1` default
  # binds loopback INSIDE the container and is unreachable over the Docker network
  # (T-dockerfile smoke confirmed `curl` → HTTP 000 until HOST=0.0.0.0).
  fixture-server:
    build:
      context: .
      target: dev
    image: openhammer:dev
    command: ["./node_modules/.bin/tsx", "test/fixtures/minimal-mcp-server.ts"]
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      MCP_TOKEN: "fixture-compose-bearer-token"
      MCP_MAX_RESPONSE_BYTES: "512000"
    healthcheck:
      # node 22's global `fetch` probes `/health` (spec 16) — no curl dep, no
      # sleep. Exec form so the `-e` script is one arg to node (no shell quoting).
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 3s

  # Deterministic SDK-client runner: connect → listTools → callTool → assert
  # (`test/compose/run-e2e.ts`). `depends_on` the fixture's health so it never
  # races a not-yet-listening server; `--exit-code-from` reports its code.
  test-runner:
    build:
      context: .
      target: dev
    image: openhammer:dev
    command: ["./node_modules/.bin/tsx", "test/compose/run-e2e.ts"]
    environment:
      MCP_URL: "http://fixture-server:3000/mcp"
      MCP_TOKEN: "fixture-compose-bearer-token"
    depends_on:
      fixture-server:
        condition: service_healthy

  # Reproducible test/typecheck/lint env: `docker compose run --rm dev npm test`
  # (npm run test:in-container). Profile-gated so it never auto-starts and its
  # exit can't abort the E2E run. Image-baked source (COPY . .) keeps it
  # reproducible; rebuild with `docker compose build dev` to pick up host edits.
  dev:
    build:
      context: .
      target: dev
    image: openhammer:dev
    profiles: ["dev"]

  # The real OpenHammer server, `node dist/main.js` over the `prod` stage
  # (task T-real-compose). `test:compose:real` retargets the runner at
  # `http://server:3000/mcp` over the compose network for all 7 tools.
  server:
    build:
      context: .
      target: prod
    image: openhammer:prod
    profiles: ["real"]
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      MCP_ROOT_DIR: "/data"
      MCP_AUTH_TOKEN: "real-compose-bearer-token"

  # Quick-tunnel bridge for the Tier-4 public-URL E2E (task T-tunnel-e2e): the
  # runner is retargeted at the parsed `https://*.trycloudflare.com` URL.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: tunnel --url http://server:3000 --no-autoupdate
    depends_on:
      server:
        condition: service_started
